<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinolinx 财务对账</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --blue: #1a73e8;
            --green: #34a853;
            --red: #ea4335;
            --text: #2d2d2d;
            --line: #dadce0;
            --bg: #f1f3f4;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 180px;
            background: #fff;
            border-right: 1px solid var(--line);
        }
        .logo {
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            color: var(--blue);
            border-bottom: 1px solid var(--line);
        }
        .nav-item {
            padding: 14px 18px;
            border-left: 4px solid transparent;
            color: #5f6368;
        }
        .nav-item.active {
            background: #e8f0fe;
            color: var(--blue);
            border-left-color: var(--blue);
            font-weight: 600;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .search-bar {
            background: #fff;
            border-bottom: 1px solid var(--line);
            padding: 14px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 12px; font-weight: 600; color: #555; }
        .input {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 8px;
            outline: none;
        }
        .content { padding: 20px; overflow: auto; }
        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 1300px;
        }
        th, td {
            border-bottom: 1px solid #eee;
            padding: 10px 8px;
            text-align: left;
        }
        th {
            background: #fafafa;
            color: #5f6368;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .tag {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            color: #fff;
            font-weight: 600;
        }
        .tag-unsign { background: var(--red); }
        .tag-signed { background: var(--green); }
        .btn {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            background: #fff;
        }
        .btn-primary {
            background: var(--blue);
            color: #fff;
            border: none;
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 20;
        }
        .modal-mask.show { display: flex; }
        .statement {
            width: min(720px, 100%);
            max-height: 92vh;
            overflow: auto;
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 14px;
        }
        .statement-head {
            display: grid;
            grid-template-columns: 250px minmax(220px, 1fr);
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-width: 0;
        }
        .logo-wrap img {
            width: 210px;
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
        .company-wrap {
            width: 255px;
            max-width: 255px;
            justify-self: end;
            text-align: right;
            padding-top: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .company-name {
            font-size: 15px;
            font-weight: 700;
            color: #1f1f1f;
            line-height: 1.14;
            white-space: nowrap;
        }
        .email-wrap {
            margin-top: 8px;
            font-size: 12.5px;
            font-weight: 500;
            color: #5f6368;
            line-height: 1.16;
        }
        .statement-title {
            margin: 10px 0 8px;
            font-size: 18px;
            font-weight: 700;
            color: #1f1f1f;
        }
        .order-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 10px;
        }
        .meta-cell {
            background: #f8f9fb;
            border: 1px solid #eceff1;
            border-radius: 8px;
            padding: 7px;
        }
        .meta-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
        }
        .meta-value {
            font-size: 13px;
            font-weight: 600;
        }
        .fee-table {
            width: 100%;
            min-width: 0;
            table-layout: fixed;
            margin-top: 4px;
            font-size: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }
        .fee-table th {
            position: static;
            background: #f7f9fc;
        }
        .fee-table th,
        .fee-table td {
            vertical-align: middle;
        }
        .fee-table th:nth-child(1),
        .fee-table td:nth-child(1) { width: 28%; }
        .fee-table th:nth-child(2),
        .fee-table td:nth-child(2) { width: 18%; text-align: center; }
        .fee-table th:nth-child(3),
        .fee-table td:nth-child(3) { width: 18%; text-align: center; }
        .fee-table th:nth-child(4),
        .fee-table td:nth-child(4) { width: 18%; }
        .fee-table th:nth-child(5),
        .fee-table td:nth-child(5) { width: 18%; text-align: center; }
        .fee-table td.amount {
            text-align: right;
            font-weight: 600;
        }
        .total-row {
            margin-top: 8px;
            text-align: right;
            font-size: 18px;
            font-weight: 700;
            color: #d93025;
        }
        .sign-zone {
            margin-top: 14px;
            border-top: 1px dashed #d0d0d0;
            padding-top: 12px;
        }
        .sign-label {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }
        #sign-pad {
            width: 100%;
            height: 180px;
            border: 2px dashed #a9b0b7;
            border-radius: 8px;
            touch-action: none;
            background: #fff;
        }
        .sign-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .order-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .statement-head {
                grid-template-columns: 160px minmax(140px, 1fr);
                gap: 8px;
            }
            .logo-wrap {
                min-width: 0;
            }
            .logo-wrap img { width: 150px; }
            .company-wrap {
                width: 170px;
                max-width: 170px;
            }
            .company-name {
                font-size: 13px;
                white-space: normal;
            }
            .email-wrap { font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">Sinolinx</div>
    <div class="nav-item active">应收管理</div>
    <div class="nav-item">应付管理</div>
</div>

<div class="main">
    <div class="search-bar">
        <div class="field"><label>客户简称</label><input class="input" placeholder="输入客户"></div>
        <div class="field"><label>入仓号</label><input class="input" placeholder="输入入仓号"></div>
        <div class="field"><label>客户订单号</label><input class="input" placeholder="输入客户订单号"></div>
        <div class="field"><label>状态</label><select class="input"><option>全部</option></select></div>
        <div class="field"><label>日期范围</label><input type="date" class="input"></div>
        <button class="btn btn-primary">查询</button>
    </div>

    <div class="content">
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>客户简称</th>
                        <th>入仓号</th>
                        <th>客户订单号</th>
                        <th>件</th>
                        <th>重(kg)</th>
                        <th>CBM</th>
                        <th>仓库代码</th>
                        <th>入仓日期</th>
                        <th>费用合计</th>
                        <th>签字状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="order-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="statement-mask" class="modal-mask">
    <div class="statement">
        <div class="statement-head">
            <div class="logo-wrap">
                <img id="statement-logo" src="assets/logo.png" alt="logo">
            </div>
            <div class="company-wrap">
                <div class="company-name" id="statement-company-name">Sinolinx Logistics limited</div>
                <div class="email-wrap" id="statement-email">e-mail: sale@sinolinx.co</div>
            </div>
        </div>

        <div class="statement-title">对账单 Statement of Account</div>

        <div class="order-grid">
            <div class="meta-cell"><div class="meta-label">客户简称</div><div class="meta-value" id="meta-customer">-</div></div>
            <div class="meta-cell"><div class="meta-label">入仓号</div><div class="meta-value" id="meta-putcode">-</div></div>
            <div class="meta-cell"><div class="meta-label">客户订单号</div><div class="meta-value" id="meta-customer-order">-</div></div>
            <div class="meta-cell"><div class="meta-label">入仓日期</div><div class="meta-value" id="meta-in-date">-</div></div>
            <div class="meta-cell"><div class="meta-label">仓库代码</div><div class="meta-value" id="meta-warehouse">-</div></div>
            <div class="meta-cell"><div class="meta-label">件</div><div class="meta-value" id="meta-pieces">-</div></div>
            <div class="meta-cell"><div class="meta-label">重量(kg)</div><div class="meta-value" id="meta-weight">-</div></div>
            <div class="meta-cell"><div class="meta-label">CBM</div><div class="meta-value" id="meta-cbm">-</div></div>
        </div>

        <table class="fee-table">
            <thead>
                <tr>
                    <th>收费明细</th>
                    <th>收费单价</th>
                    <th>收费单位</th>
                    <th style="text-align:right;">金额</th>
                    <th>币种</th>
                </tr>
            </thead>
            <tbody id="fee-body"></tbody>
        </table>

        <div class="total-row" id="fee-total">Total: USD 0.00</div>

        <div class="sign-zone">
            <div class="sign-label">客户签字（请在下框内手写签字，完成后点“完成并保存PDF”）</div>
            <canvas id="sign-pad"></canvas>
            <div class="sign-actions">
                <button class="btn" id="btn-clear-sign">清空签字</button>
                <button class="btn" id="btn-cancel">取消</button>
                <button class="btn btn-primary" id="btn-save-pdf">完成并保存PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
const FIN_BUILD = '2026-04-10-07';
const COMPANY_NAME = 'Sinolinx Logistics limited';
const COMPANY_EMAIL = 'sale@sinolinx.co';

const orders = [
    {
        id: 1,
        date: '2026-04-09',
        customer: 'AU Union',
        putCode: 'WH260409-S1',
        customerOrderNo: 'ORD-2026001',
        pieces: 25,
        weightKg: 500,
        cbm: 2.5,
        warehouseCode: 'BWU2',
        inDate: '2026-04-09',
        billedWeight: 520,
        total: 3250,
        signed: false
    }
];

function round2(value) {
    return Math.round(Number(value) * 100) / 100;
}

function buildFeeDetails(total, billedWeight) {
    const baseFreight = round2(total * 0.78);
    const fuelSurcharge = round2(total * 0.12);
    const handlingFee = round2(total * 0.06);
    const documentFee = round2(total - baseFreight - fuelSurcharge - handlingFee);
    return [
        { item: 'Base Freight', unitPrice: round2(baseFreight / billedWeight), unit: `${billedWeight} KG`, amount: baseFreight, currency: 'USD' },
        { item: 'Fuel Surcharge', unitPrice: fuelSurcharge, unit: 'LOT', amount: fuelSurcharge, currency: 'USD' },
        { item: 'Handling Fee', unitPrice: handlingFee / 1, unit: 'LOT', amount: handlingFee, currency: 'USD' },
        { item: 'Document Fee', unitPrice: documentFee / 1, unit: 'LOT', amount: documentFee, currency: 'USD' }
    ];
}

const maskEl = document.getElementById('statement-mask');
const feeBodyEl = document.getElementById('fee-body');
const signPad = document.getElementById('sign-pad');
const ctx = signPad.getContext('2d');
let activeOrder = null;
let signatureDirty = false;
let drawing = false;
let logoDataUrlCache = '';

function renderOrders() {
    const tbody = document.getElementById('order-body');
    tbody.innerHTML = '';
    orders.forEach((order) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${order.date}</td>
            <td><strong>${order.customer}</strong></td>
            <td>${order.putCode}</td>
            <td>${order.customerOrderNo}</td>
            <td>${order.pieces}</td>
            <td>${order.weightKg}</td>
            <td>${order.cbm}</td>
            <td>${order.warehouseCode}</td>
            <td>${order.inDate}</td>
            <td><strong>$${order.total.toFixed(2)}</strong></td>
            <td><span class="tag ${order.signed ? 'tag-signed' : 'tag-unsign'}">${order.signed ? '已签字' : '未签字'}</span></td>
            <td><button class="btn btn-primary" onclick="openStatement(${order.id})">签字并保存PDF</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function openStatement(orderId) {
    const order = orders.find((item) => item.id === orderId);
    if (!order) return;
    activeOrder = order;

    document.getElementById('statement-email').textContent = `e-mail: ${COMPANY_EMAIL}`;
    document.getElementById('meta-putcode').textContent = order.putCode;
    document.getElementById('meta-customer-order').textContent = order.customerOrderNo;
    document.getElementById('meta-pieces').textContent = String(order.pieces);
    document.getElementById('meta-weight').textContent = String(order.weightKg);
    document.getElementById('meta-cbm').textContent = String(order.cbm);
    document.getElementById('meta-warehouse').textContent = order.warehouseCode;
    document.getElementById('meta-in-date').textContent = order.inDate;
    document.getElementById('meta-customer').textContent = order.customer;

    const feeDetails = buildFeeDetails(order.total, order.billedWeight);
    feeBodyEl.innerHTML = '';
    feeDetails.forEach((row) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${row.item}</td>
            <td>${Number(row.unitPrice).toFixed(2)}</td>
            <td>${row.unit}</td>
            <td class="amount">${row.amount.toFixed(2)}</td>
            <td>${row.currency}</td>
        `;
        feeBodyEl.appendChild(tr);
    });
    document.getElementById('fee-total').textContent = `Total: USD ${order.total.toFixed(2)}`;

    signatureDirty = false;
    resetSignPad();
    maskEl.classList.add('show');
}

function closeStatement() {
    maskEl.classList.remove('show');
    activeOrder = null;
}

function resetSignPad() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    signPad.width = Math.floor(signPad.clientWidth * ratio);
    signPad.height = Math.floor(signPad.clientHeight * ratio);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(ratio, ratio);
    ctx.clearRect(0, 0, signPad.clientWidth, signPad.clientHeight);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';
}

function getPos(evt) {
    const rect = signPad.getBoundingClientRect();
    const source = evt.touches ? evt.touches[0] : evt;
    return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
    };
}

function startDraw(evt) {
    drawing = true;
    const p = getPos(evt);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}

function moveDraw(evt) {
    if (!drawing) return;
    const p = getPos(evt);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    signatureDirty = true;
}

function stopDraw() {
    drawing = false;
}

signPad.addEventListener('mousedown', startDraw);
signPad.addEventListener('mousemove', moveDraw);
window.addEventListener('mouseup', stopDraw);
signPad.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, { passive: false });
signPad.addEventListener('touchmove', (e) => { e.preventDefault(); moveDraw(e); }, { passive: false });
window.addEventListener('touchend', stopDraw);

window.addEventListener('resize', () => {
    if (maskEl.classList.contains('show')) resetSignPad();
});

document.getElementById('btn-clear-sign').addEventListener('click', () => {
    signatureDirty = false;
    resetSignPad();
});
document.getElementById('btn-cancel').addEventListener('click', closeStatement);
document.getElementById('btn-save-pdf').addEventListener('click', saveSignedPdf);
maskEl.addEventListener('click', (e) => {
    if (e.target === maskEl) closeStatement();
});

function blobToDataUrl(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
    });
}

async function getLogoDataUrl() {
    if (logoDataUrlCache) return logoDataUrlCache;
    try {
        const resp = await fetch(`assets/logo.png?v=${FIN_BUILD}`, { cache: 'no-store' });
        const blob = await resp.blob();
        logoDataUrlCache = await blobToDataUrl(blob);
    } catch (err) {
        logoDataUrlCache = '';
    }
    return logoDataUrlCache;
}

async function saveSignedPdf() {
    if (!activeOrder) return;
    if (!signatureDirty) {
        alert('请先在签字框完成签字。');
        return;
    }

    const order = activeOrder;
    const feeDetails = buildFeeDetails(order.total, order.billedWeight);
    const signatureDataUrl = signPad.toDataURL('image/png');
    const logoDataUrl = await getLogoDataUrl();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    if (logoDataUrl) {
        doc.addImage(logoDataUrl, 'PNG', 14, 10, 58, 15);
    }
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text(COMPANY_NAME, 196, 16, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.text(`e-mail: ${COMPANY_EMAIL}`, 196, 23, { align: 'right' });

    doc.setFontSize(16);
    doc.text('Statement of Account', 105, 34, { align: 'center' });

    doc.autoTable({
        startY: 40,
        theme: 'grid',
        head: [['字段', '内容', '字段', '内容']],
        body: [
            ['客户简称', order.customer, '入仓号', order.putCode],
            ['客户订单号', order.customerOrderNo, '入仓日期', order.inDate],
            ['仓库代码', order.warehouseCode, '件', String(order.pieces)],
            ['重量(kg)', String(order.weightKg), 'CBM', String(order.cbm)]
        ],
        styles: { fontSize: 10, cellPadding: 2.6 },
        headStyles: { fillColor: [26, 115, 232] }
    });

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 6,
        theme: 'grid',
        head: [['收费明细', '收费单价', '收费单位', '金额', '币种']],
        body: feeDetails.map((row) => [
            row.item,
            Number(row.unitPrice).toFixed(2),
            row.unit,
            row.amount.toFixed(2),
            row.currency
        ]),
        styles: { fontSize: 10, cellPadding: 2.6 },
        headStyles: { fillColor: [52, 168, 83] },
        columnStyles: {
            0: { cellWidth: 48 },
            1: { cellWidth: 30, halign: 'center' },
            2: { cellWidth: 30, halign: 'center' },
            3: { cellWidth: 32, halign: 'right' },
            4: { cellWidth: 22, halign: 'center' }
        }
    });

    const totalY = doc.lastAutoTable.finalY + 8;
    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text(`Total: USD ${order.total.toFixed(2)}`, 196, totalY, { align: 'right' });
    doc.setFont('helvetica', 'normal');

    const signTop = totalY + 8;
    doc.setFontSize(11);
    doc.text('客户签字 / Customer Signature', 14, signTop);
    doc.rect(14, signTop + 2, 90, 35);
    doc.addImage(signatureDataUrl, 'PNG', 16, signTop + 4, 86, 31);
    doc.setFontSize(10);
    doc.text(`Signed Date: ${new Date().toISOString().slice(0, 10)}`, 120, signTop + 12);
    doc.text(`Build: ${FIN_BUILD}`, 120, signTop + 20);

    doc.save(`${order.customerOrderNo}_signed_statement.pdf`);

    order.signed = true;
    renderOrders();
    closeStatement();
    alert('已完成签字并保存PDF。');
}

renderOrders();
</script>
</body>
</html>
