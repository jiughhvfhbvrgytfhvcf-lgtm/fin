<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AU-EXPRESS | 财务控制台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --g-blue: #4285f4; --g-red: #ea4335; --g-green: #34a853; --border: #dadce0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: #f1f3f4; overflow: hidden; }
        .sidebar { width: 180px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 20px; font-size: 16px; color: var(--g-blue); font-weight: bold; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #5f6368; font-size: 14px; border-left: 4px solid transparent; }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); font-weight: bold; border-left: 4px solid var(--g-blue); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .search-bar { background: #fff; padding: 16px 24px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; align-items: end; }
        .field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; font-weight: bold; }
        .input { border: 1px solid var(--border); padding: 8px; border-radius: 4px; outline: none; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1200px; }
        th { background: #fafafa; color: #5f6368; text-align: left; padding: 12px 10px; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .sign-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; font-size: 11px; }
        .unsign { background: var(--g-red); }
        .signed { background: var(--g-green); }
        .btn { padding: 8px 14px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; }
        .btn-blue { background: var(--g-blue); color: white; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">AU-EXPRESS</div>
    <div class="nav-item active">应收管理</div>
    <div class="nav-item">应付管理</div>
</div>

<div class="main">
    <div class="search-bar">
        <div class="field"><label>客户简称</label><input type="text" class="input" placeholder="输入客户..."></div>
        <div class="field"><label>入仓号</label><input type="text" class="input" placeholder="输入入仓号..."></div>
        <div class="field"><label>客人订单号</label><input type="text" class="input" placeholder="输入订单号..."></div>
        <div class="field"><label>状态</label><select class="input"><option>全部</option></select></div>
        <div class="field"><label>日期范围</label><input type="date" class="input"></div>
        <button class="btn btn-blue">查询</button>
    </div>

    <div class="content">
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>日期</th><th>客户简称</th><th>入仓号</th><th>客人订单号</th><th>目的地</th><th>件数</th><th>重量</th><th>CBM</th><th>计费重量</th><th>费用合计</th><th>签字确认</th><th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-04-09</td>
                        <td><strong>AU Union</strong></td>
                        <td>WH260409-S1</td>
                        <td>ORD-2026001</td>
                        <td>Melbourne</td>
                        <td>25</td>
                        <td>500kg</td>
                        <td>2.5</td>
                        <td>520kg</td>
                        <td style="font-weight: bold;">$3,250.00</td>
                        <td><span id="st-1" class="sign-tag unsign">未签字</span></td>
                        <td>
                            <button class="btn btn-blue" onclick="makeLink('AU Union', 'ORD-2026001', 3250)">生成PDF+签字链接</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const FIN_BUILD = '2026-04-09-03';
const FIN_PUBLIC_ORIGIN = 'https://fin.51fahuo.cn';
const COMPANY_NAME = 'Sinolinx Logistics limited';
const COMPANY_EMAIL = 'sale@sinolinx.co';

function encodePayload(payload) {
    const json = JSON.stringify(payload);
    if (typeof TextEncoder !== 'undefined') {
        const bytes = new TextEncoder().encode(json);
        let binary = '';
        bytes.forEach((b) => {
            binary += String.fromCharCode(b);
        });
        return btoa(binary);
    }
    return btoa(unescape(encodeURIComponent(json)));
}

function round2(value) {
    return Math.round(Number(value) * 100) / 100;
}

function buildFeeDetails(total, billedWeight) {
    const baseFreight = round2(total * 0.78);
    const fuelSurcharge = round2(total * 0.12);
    const handlingFee = round2(total * 0.06);
    const documentFee = round2(total - baseFreight - fuelSurcharge - handlingFee);

    return [
        { item: 'Base Freight', detail: `Billed Weight ${billedWeight} kg`, amount: baseFreight },
        { item: 'Fuel Surcharge', detail: 'Fuel index adjustment', amount: fuelSurcharge },
        { item: 'Handling Fee', detail: 'Warehouse & loading operation', amount: handlingFee },
        { item: 'Document Fee', detail: 'Billing and declaration service', amount: documentFee }
    ];
}

async function makeLink(cust, ord, total) {
    const billedWeight = 520;
    const feeDetails = buildFeeDetails(total, billedWeight);

    // 1. 先生成线上签字链接（用于 PDF 内嵌和消息复制）
    const payload = encodePayload({
        companyName: COMPANY_NAME,
        companyEmail: COMPANY_EMAIL,
        cust,
        ord,
        total: Number(total),
        currency: 'USD',
        feeDetails,
        generatedDate: new Date().toISOString().slice(0, 10)
    });
    const smartLink = `${FIN_PUBLIC_ORIGIN}/v/bill/index.html?data=${encodeURIComponent(payload)}`;
    if (!smartLink.startsWith(`${FIN_PUBLIC_ORIGIN}/`)) {
        alert('签字链接生成异常，请刷新页面后重试。');
        return;
    }

    // 1. 下载 PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text(COMPANY_NAME, 105, 16, { align: 'center' });
    doc.setFontSize(11);
    doc.text(`Email: ${COMPANY_EMAIL}`, 105, 23, { align: 'center' });
    doc.setFontSize(14);
    doc.text('Statement of Account', 105, 32, { align: 'center' });

    doc.autoTable({
        startY: 38,
        head: [['Field', 'Value']],
        body: [
            ['Customer', cust],
            ['Statement No.', ord],
            ['Currency', 'USD'],
            ['Date', new Date().toISOString().slice(0, 10)]
        ],
        styles: { fontSize: 10 },
        headStyles: { fillColor: [66, 133, 244] }
    });

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 8,
        head: [['Charge Item', 'Detail', 'Amount (USD)']],
        body: feeDetails.map((row) => [row.item, row.detail, row.amount.toFixed(2)]),
        styles: { fontSize: 10 },
        headStyles: { fillColor: [52, 168, 83] }
    });

    const totalY = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text(`Total Amount: USD ${Number(total).toFixed(2)}`, 14, totalY);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Sign Link:', 14, totalY + 8);
    doc.setTextColor(26, 115, 232);
    doc.textWithLink(smartLink, 14, totalY + 14, { url: smartLink });
    doc.setTextColor(0, 0, 0);
    doc.save(`${ord}_statement.pdf`);

    // 3. 复制微信文案
    const detailLines = feeDetails.map((row, idx) => `${idx + 1}. ${row.item}: $${row.amount.toFixed(2)}`).join('\n');
    const text = `您好 ${cust}，\n${COMPANY_NAME}\nEmail: ${COMPANY_EMAIL}\n\n账单号：${ord}\n收费明细：\n${detailLines}\n总金额：$${Number(total).toFixed(2)}\n\n请点击链接完成签字确认：\n${smartLink}`;

    await navigator.clipboard.writeText(text);
    alert(`✅ 对账单 PDF 已下载\n✅ 已复制收费明细 + 签字链接\n✅ build: ${FIN_BUILD}`);
}
</script>
</body>
</html>
