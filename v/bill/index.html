<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账单签字确认 | Sinolinx Logistics</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; margin: 0; }
        .bill { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #003366; margin-bottom: 20px; padding-bottom: 10px; }
        .logo-text { color: #003366; font-size: 24px; font-weight: bold; margin: 0; }
        .total { font-size: 32px; color: #d93025; font-weight: bold; margin: 25px 0; }
        canvas { border: 2px dashed #ccc; border-radius: 8px; background: #fafafa; touch-action: none; width: 100%; height: 200px; margin-top: 10px; }
        .btn { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; background: #34a853; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bill">
        <div class="header">
            <p class="logo-text">Sinolinx Logistics</p>
            <small>中外联运 · 电子账单确认</small>
        </div>
        <p>单号: <strong id="ord-id">--</strong></p>
        <div class="total">$3,250.00</div>
        <div style="text-align:left; font-size:12px; color:#666;">请在此手写签字确认：</div>
        <canvas id="pad"></canvas>
        <button class="btn" onclick="alert('签字已确认，感谢配合！')">提交签字确认</button>
    </div>
    <script>
        const canvas = document.getElementById('pad');
        const ctx = canvas.getContext('2d');
        let writing = false;

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if(token) { try { document.getElementById('ord-id').innerText = atob(token); } catch(e) { document.getElementById('ord-id').innerText = token; } }

        const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = 'round'; };
        window.onresize = resize; resize();

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top };
        };
        const start = (e) => { writing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
        const draw = (e) => { if(!writing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const stop = () => { writing = false; };

        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stop);
    </script>
</body>
</html>
